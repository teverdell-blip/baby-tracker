<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Baby Tracker">
<meta name="theme-color" content="#ffffff">
<title>Baby Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --feed: #6B9FD4; --feed-light: #EBF3FB;
    --wee: #F0C040;  --wee-light: #FEF9E7;
    --poo: #A97C50;  --poo-light: #F5EDE3;
    --nap: #9B8EC4;  --nap-light: #F0EDF8;
    --bg: #FAFAF8; --white: #fff;
    --border: #EBEBEB; --text: #1A1A1A; --muted: #888; --faint: #BBB;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; min-height: 100vh; }

  .header { background: var(--white); border-bottom: 1px solid var(--border); padding: calc(16px + var(--safe-top)) 16px 14px; position: sticky; top: 0; z-index: 20; }
  .header-inner { display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-weight: 700; font-size: 18px; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .menu-btn { background: #F4F4F4; border: none; border-radius: 10px; padding: 8px 14px; font-size: 20px; cursor: pointer; color: #555; }

  .sync-bar { padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; border-bottom: 1px solid var(--border); }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .sync-left { display: flex; align-items: center; }
  .sync-btn { border: none; border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: #fff; cursor: pointer; }

  .section-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .today-grid { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 10px; margin-bottom: 14px; }
  .today-card { border-radius: 14px; padding: 14px 10px; text-align: center; }
  .today-emoji { font-size: 22px; }
  .today-count { font-weight: 700; font-size: 28px; line-height: 1.1; margin-top: 4px; }
  .today-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .today-nap { border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
  .today-nap-right { flex: 1; }
  .today-nap-count { font-weight: 700; font-size: 28px; line-height: 1.1; }
  .today-nap-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .today-nap-total { font-size: 12px; font-weight: 600; margin-top: 3px; }

  .log-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .log-btn { border: none; border-radius: 12px; padding: 12px 6px; font-weight: 600; font-size: 13px; cursor: pointer; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: opacity 0.1s; }
  .log-btn:active { opacity: 0.75; }

  /* Active nap banner */
  .nap-active-bar { background: var(--nap-light); border-bottom: 1px solid #D4CCE8; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
  .nap-active-left { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: #5A4A8A; }
  .nap-timer { font-size: 20px; font-weight: 800; color: var(--nap); font-variant-numeric: tabular-nums; }
  .nap-stop-btn { background: var(--nap); border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 700; color: #fff; cursor: pointer; }

  .date-group { margin-bottom: 20px; }
  .date-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .entry-list { background: var(--white); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  .entry-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid #F3F3F3; }
  .entry-row:last-child { border-bottom: none; }
  .entry-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-title { font-weight: 600; font-size: 14px; }
  .entry-title span { font-weight: 400; color: var(--muted); }
  .entry-note { font-size: 12px; color: #AAA; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-meta { text-align: right; flex-shrink: 0; }
  .entry-time { font-size: 13px; color: var(--muted); }
  .entry-who { font-size: 11px; color: #BBB; margin-top: 1px; }
  .remove-btn { background: none; border: none; color: #CCC; font-size: 11px; cursor: pointer; padding: 2px 0; margin-top: 2px; display: block; }

  .empty { text-align: center; padding: 40px 20px; color: var(--faint); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-weight: 600; font-size: 15px; color: #AAA; }
  .empty-sub { font-size: 13px; margin-top: 4px; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50; display: flex; align-items: flex-end; }
  .sheet { background: var(--white); border-radius: 20px 20px 0 0; padding: 24px 20px calc(32px + var(--safe-bottom)); width: 100%; max-width: 480px; margin: 0 auto; max-height: 90vh; overflow-y: auto; }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .sheet-title { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 10px; }
  .close-btn { background: #F0F0F0; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 18px; cursor: pointer; color: #555; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill { padding: 8px 14px; border-radius: 20px; border: 2px solid #E8E8E8; background: #fff; color: #555; font-weight: 600; font-size: 13px; cursor: pointer; }
  .pill.active-feed { border-color: var(--feed); background: var(--feed-light); color: var(--feed); }
  .pill.active-nap  { border-color: var(--nap);  background: var(--nap-light);  color: var(--nap); }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
  .field input { width: 100%; padding: 11px 12px; border-radius: 10px; border: 1.5px solid #E8E8E8; font-size: 15px; outline: none; background: #fff; }
  .field input:focus { border-color: #AACCE8; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-primary { width: 100%; border: none; border-radius: 14px; padding: 16px; font-weight: 700; font-size: 16px; cursor: pointer; color: #fff; margin-bottom: 10px; }
  .btn-secondary { width: 100%; background: #F0F0F0; border: none; border-radius: 12px; padding: 14px; font-weight: 700; font-size: 15px; cursor: pointer; color: #333; margin-bottom: 10px; display: block; text-align: center; }
  .btn-danger { width: 100%; background: none; border: 1.5px solid #e53935; border-radius: 12px; padding: 12px; font-weight: 600; font-size: 14px; cursor: pointer; color: #e53935; }
  .btn-danger-confirm { background: #e53935; color: #fff; border: none; border-radius: 10px; padding: 10px; font-weight: 600; font-size: 14px; cursor: pointer; flex: 1; }
  .btn-cancel { background: #F0F0F0; border: none; border-radius: 10px; padding: 10px; font-weight: 600; font-size: 14px; cursor: pointer; flex: 1; }

  .info-box { background: #F8F8F8; border-radius: 12px; padding: 14px; margin-bottom: 14px; font-size: 13px; color: #555; line-height: 1.6; }
  .warn-box { background: #FFF8E7; border-radius: 12px; padding: 14px; margin-bottom: 14px; font-size: 13px; color: #7A5C00; line-height: 1.6; }
  .confirm-box { background: #FFF0F0; border-radius: 12px; padding: 14px; }
  .confirm-box p { font-size: 14px; font-weight: 600; color: #c62828; margin-bottom: 10px; }
  .confirm-row { display: flex; gap: 8px; }

  .nap-or { text-align: center; font-size: 13px; color: #AAA; margin: 4px 0 12px; }

  .setup-step { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
  .step-num { background: #6B9FD4; color: #fff; border-radius: 50%; width: 26px; height: 26px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-text { font-size: 13px; color: #444; line-height: 1.6; flex: 1; }
  .step-text strong { color: #111; display: block; margin-bottom: 2px; }
  .step-text code { background: #F0F0F0; border-radius: 4px; padding: 1px 5px; font-size: 12px; font-family: monospace; }

  .code-block { background: #1A1E2E; border-radius: 10px; padding: 14px; margin: 10px 0; position: relative; }
  .code-block pre { color: #E2E8F0; font-size: 11px; line-height: 1.7; white-space: pre-wrap; font-family: monospace; margin: 0; }
  .copy-code-btn { position: absolute; top: 10px; right: 10px; background: #334155; border: none; border-radius: 6px; color: #94A3B8; padding: 5px 10px; font-size: 11px; cursor: pointer; }

  .deploy-box { background: #fff; border: 1px solid #E8EBF0; border-radius: 10px; overflow: hidden; margin: 10px 0; }
  .deploy-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #F3F3F3; font-size: 13px; }
  .deploy-row:last-child { border-bottom: none; }
  .deploy-label { color: #666; }
  .deploy-val { font-weight: 600; color: #1A1A1A; background: #EBF3FB; border-radius: 6px; padding: 3px 10px; font-size: 12px; color: #4A7FB5; }

  .toast { position: fixed; top: calc(16px + var(--safe-top)); left: 50%; transform: translateX(-50%); color: #fff; padding: 10px 20px; border-radius: 24px; font-weight: 600; font-size: 14px; z-index: 999; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.18); }

  .content { padding: 16px 16px 0; }
  .spacer { height: 40px; }
  .divider { height: 1px; background: #F0F0F0; margin: 16px 0; }
</style>
</head>
<body>
<div id="app"></div>
<script>
let SCRIPT_URL = localStorage.getItem('bt-script-url') || '';
let WHO = localStorage.getItem('bt-who') || '';

let logs = [];
let modal = null;
let feedType = 'Breast L';
let feedDuration = '', feedAmount = '', noteVal = '';
let napDuration = '', napLocation = '';
let napMode = 'timer'; // 'timer' | 'manual'
let confirmClear = false;
let syncStatus = 'idle';
let lastSync = null;
let toastTimer = null;
let tempUrl = '';

// Active nap timer state
let activeNap = null; // { startTime: ISO string }
let napTickInterval = null;

const FEED_TYPES = ['Breast L','Breast R','Both','Formula','Expressed'];
const NAP_LOCATIONS = ['Cot','Pram','Arms','Car','Carrier'];

const TYPES = {
  feed: { label:'Feed', emoji:'🍼', color:'#6B9FD4', light:'#EBF3FB' },
  wee:  { label:'Wee',  emoji:'💛', color:'#F0C040', light:'#FEF9E7' },
  poo:  { label:'Poo',  emoji:'💩', color:'#A97C50', light:'#F5EDE3' },
  nap:  { label:'Nap',  emoji:'😴', color:'#9B8EC4', light:'#F0EDF8' },
};

function fmt(iso) {
  return new Date(iso).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function fmtDate(iso) {
  const d=new Date(iso),today=new Date(),yest=new Date();
  yest.setDate(today.getDate()-1);
  if(d.toDateString()===today.toDateString()) return 'Today';
  if(d.toDateString()===yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
}
function timeSince(iso) {
  const m=Math.floor((Date.now()-new Date(iso))/60000);
  if(m<1) return 'just now';
  if(m<60) return m+'m ago';
  return Math.floor(m/60)+'h '+(m%60)+'m ago';
}
function fmtDuration(mins) {
  if (!mins) return '';
  if (mins < 60) return mins + 'm';
  return Math.floor(mins/60) + 'h ' + (mins%60 > 0 ? (mins%60)+'m' : '');
}
function elapsedMins(startIso) {
  return Math.floor((Date.now() - new Date(startIso)) / 60000);
}
function elapsedDisplay(startIso) {
  const total = Math.floor((Date.now() - new Date(startIso)) / 1000);
  const h = Math.floor(total/3600);
  const m = Math.floor((total%3600)/60);
  const s = total%60;
  if (h>0) return h+'h '+String(m).padStart(2,'0')+'m';
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function groupByDate(arr) {
  const g={};
  [...arr].reverse().forEach(e=>{
    const k=new Date(e.timestamp).toDateString();
    if(!g[k]) g[k]=[];
    g[k].push(e);
  });
  return g;
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function totalNapMins(dayLogs) {
  return dayLogs.filter(l=>l.type==='nap').reduce((s,l)=>s+(parseInt(l.duration)||0),0);
}

function showToast(msg, color='#4CAF50') {
  const old=document.getElementById('toast');
  if(old) old.remove();
  if(toastTimer) clearTimeout(toastTimer);
  const t=document.createElement('div');
  t.id='toast';t.className='toast';t.style.background=color;t.textContent=msg;
  document.body.appendChild(t);
  toastTimer=setTimeout(()=>t.remove(),2800);
}

// ── Nap timer ──
function startNapTimer() {
  activeNap = { startTime: new Date().toISOString() };
  localStorage.setItem('bt-active-nap', JSON.stringify(activeNap));
  modal = null;
  if (napTickInterval) clearInterval(napTickInterval);
  napTickInterval = setInterval(renderNapBar, 1000);
  render();
  showToast('😴 Nap started!', '#9B8EC4');
}

function stopNapTimer() {
  if (!activeNap) return;
  const mins = elapsedMins(activeNap.startTime);
  const entry = {
    id: uid(), type: 'nap',
    timestamp: activeNap.startTime,
    duration: mins > 0 ? String(mins) : '1',
    napLocation: null, who: WHO||null, note: null,
  };
  activeNap = null;
  localStorage.removeItem('bt-active-nap');
  if (napTickInterval) { clearInterval(napTickInterval); napTickInterval=null; }
  logs.push(entry);
  modal = null;
  render();
  showToast('😴 Nap saved — ' + fmtDuration(parseInt(entry.duration)), '#9B8EC4');
  syncWithSheet(entry);
}

function renderNapBar() {
  const bar = document.getElementById('nap-timer-display');
  if (bar && activeNap) bar.textContent = elapsedDisplay(activeNap.startTime);
}

// ── Sync ──
async function syncWithSheet(newEntry=null) {
  if(!SCRIPT_URL){syncStatus='no-url';render();return;}
  syncStatus='syncing';render();
  try {
    const res=await fetch(SCRIPT_URL+'?action=get');
    const data=await res.json();
    const remote=Array.isArray(data.logs)?data.logs:[];
    const ids=new Set(logs.map(l=>l.id));
    remote.forEach(r=>{if(!ids.has(r.id)) logs.push(r);});
    logs.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
    if(newEntry){
      await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'add',entry:newEntry})});
    }
    lastSync=new Date();syncStatus='ok';
  } catch(e){syncStatus='error';}
  render();
}
async function deleteFromSheet(id){
  if(!SCRIPT_URL)return;
  try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'delete',id})});}catch(e){}
}

// ── Actions ──
function openModal(type) {
  modal=type;feedType='Breast L';feedDuration='';feedAmount='';noteVal='';
  napDuration='';napLocation='';napMode='timer';confirmClear=false;
  render();
}
function closeModal(){modal=null;confirmClear=false;render();}
function setFeedType(ft){feedType=ft;render();}
function setNapLocation(l){napLocation=l;render();}
function setNapMode(m){napMode=m;render();}

function readInputs(){
  ['inp-dur','inp-amt','inp-note','inp-url','inp-who','inp-nap-dur','inp-nap-loc'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    if(id==='inp-dur') feedDuration=el.value;
    if(id==='inp-amt') feedAmount=el.value;
    if(id==='inp-note') noteVal=el.value;
    if(id==='inp-url') tempUrl=el.value.trim();
    if(id==='inp-who') WHO=el.value.trim();
    if(id==='inp-nap-dur') napDuration=el.value;
  });
}

async function logEntry() {
  readInputs();
  let entry;
  if (modal==='nap') {
    if (napMode==='timer') { startNapTimer(); return; }
    entry = {
      id:uid(), type:'nap',
      timestamp: new Date().toISOString(),
      duration: napDuration||null,
      napLocation: napLocation||null,
      who: WHO||null, note: noteVal||null,
    };
  } else {
    entry = {
      id:uid(), type:modal,
      timestamp:new Date().toISOString(),
      who:WHO||null,
      ...(modal==='feed'&&{feedType,duration:feedDuration||null,amount:feedAmount||null}),
      note:noteVal||null,
    };
  }
  logs.push(entry);
  const t=TYPES[modal];
  modal=null; render();
  showToast(t.emoji+' '+t.label+' logged!', t.color);
  await syncWithSheet(entry);
}

async function removeEntry(id){
  logs=logs.filter(l=>l.id!==id);
  render();
  await deleteFromSheet(id);
  await syncWithSheet();
}
function clearAll(){logs=[];confirmClear=false;modal=null;render();showToast('🗑️ Data cleared');}
function saveUrl(){
  readInputs();
  if(!tempUrl){showToast('Please paste a URL first','#e53935');return;}
  SCRIPT_URL=tempUrl;localStorage.setItem('bt-script-url',SCRIPT_URL);
  if(WHO) localStorage.setItem('bt-who',WHO);
  modal=null;showToast('✅ Connected!');syncWithSheet();
}
function saveWho(){readInputs();if(WHO) localStorage.setItem('bt-who',WHO);modal=null;render();}

// ── Render ──
function render() {
  const todayStr=new Date().toDateString();
  const todayLogs=logs.filter(l=>new Date(l.timestamp).toDateString()===todayStr);
  const counts={feed:0,wee:0,poo:0,nap:0};
  todayLogs.forEach(l=>counts[l.type]=(counts[l.type]||0)+1);
  const totalNap = totalNapMins(todayLogs);
  const lastFeed=[...logs].reverse().find(l=>l.type==='feed');
  const grouped=groupByDate(logs);
  const isSetup=!SCRIPT_URL;

  const dotColor=syncStatus==='ok'?'#4CAF50':syncStatus==='error'?'#e53935':syncStatus==='syncing'?'#F0C040':'#CCC';
  const syncLabel=syncStatus==='ok'?(lastSync?'Synced '+timeSince(lastSync.toISOString()):'Synced'):
    syncStatus==='syncing'?'Syncing…':syncStatus==='error'?'Sync failed':'Not connected';

  let h=`
  <div class="header">
    <div class="header-inner">
      <div class="header-left">
        <span style="font-size:26px">👶</span>
        <div>
          <div class="header-title">Baby Tracker</div>
          <div class="header-sub">${lastFeed?'Last feed: '+timeSince(lastFeed.timestamp)+' · '+lastFeed.feedType:'No feeds logged yet'}</div>
        </div>
      </div>
      <button class="menu-btn" onclick="openModal('menu')">⋯</button>
    </div>
  </div>
  <div class="sync-bar" style="background:${syncStatus==='error'?'#FFF0F0':syncStatus==='no-url'?'#FFF8E7':'#fff'}">
    <div class="sync-left"><span class="sync-dot" style="background:${dotColor}"></span><span style="font-size:12px;color:#666">${syncLabel}</span></div>
    ${isSetup
      ?`<button class="sync-btn" style="background:#6B9FD4" onclick="openModal('setup')">Set up sync →</button>`
      :`<button class="sync-btn" style="background:#6B9FD4" onclick="syncWithSheet()">↻ Refresh</button>`
    }
  </div>`;

  // Active nap banner
  if (activeNap) {
    h+=`<div class="nap-active-bar">
      <div class="nap-active-left">😴 Napping · <span class="nap-timer" id="nap-timer-display">${elapsedDisplay(activeNap.startTime)}</span></div>
      <button class="nap-stop-btn" onclick="stopNapTimer()">Stop & Save</button>
    </div>`;
  }

  h+=`<div class="content">
  <div class="section-label" style="margin-top:4px">Today</div>
  <div class="today-grid">
    <div class="today-card" style="background:var(--feed-light)">
      <div class="today-emoji">🍼</div>
      <div class="today-count" style="color:var(--feed)">${counts.feed}</div>
      <div class="today-label">Feeds</div>
    </div>
    <div class="today-card" style="background:var(--wee-light)">
      <div class="today-emoji">💛</div>
      <div class="today-count" style="color:var(--wee)">${counts.wee}</div>
      <div class="today-label">Wees</div>
    </div>
    <div class="today-nap" style="background:var(--nap-light)">
      <span style="font-size:28px">😴</span>
      <div class="today-nap-right">
        <div style="display:flex;align-items:baseline;gap:8px">
          <div class="today-nap-count" style="color:var(--nap)">${counts.nap}</div>
          <div class="today-nap-label">Naps</div>
        </div>
        <div class="today-nap-total" style="color:var(--nap)">${totalNap>0?fmtDuration(totalNap)+' total':'No naps yet'}</div>
      </div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    <div class="today-card" style="background:var(--poo-light)">
      <div class="today-emoji">💩</div>
      <div class="today-count" style="color:var(--poo)">${counts.poo}</div>
      <div class="today-label">Poos</div>
    </div>
    <div style="background:#F8F8F8;border-radius:14px;padding:14px 10px;text-align:center">
      <div style="font-size:13px;color:#AAA;margin-top:4px">Last nap</div>
      <div style="font-size:13px;font-weight:600;color:#888;margin-top:4px">${(()=>{const ln=[...logs].reverse().find(l=>l.type==='nap');return ln?timeSince(ln.timestamp):'—';})()}</div>
    </div>
  </div>

  <div class="log-grid">
    ${Object.entries(TYPES).map(([type,cfg])=>`
      <button class="log-btn" style="background:${cfg.color}" onclick="openModal('${type}')">
        <span style="font-size:20px">${cfg.emoji}</span>${cfg.label}
      </button>`).join('')}
  </div>`;

  // History
  if(Object.keys(grouped).length===0){
    h+=`<div class="empty"><div class="empty-icon">👶</div><div class="empty-title">No entries yet</div><div class="empty-sub">${isSetup?'Set up sync then start logging':'Tap a button above to get started'}</div></div>`;
  } else {
    Object.entries(grouped).forEach(([,entries])=>{
      const dayNap=totalNapMins(entries);
      h+=`<div class="date-group"><div class="date-label">${fmtDate(entries[0].timestamp)}${dayNap>0?' · 😴 '+fmtDuration(dayNap)+' sleep':''}</div><div class="entry-list">`;
      entries.forEach(e=>{
        const cfg=TYPES[e.type];
        let detail='';
        if(e.type==='feed'){
          if(e.feedType) detail+=' · '+e.feedType;
          if(e.duration) detail+=' · '+e.duration+' min';
          if(e.amount) detail+=' · '+e.amount+' mL';
        }
        if(e.type==='nap'){
          if(e.duration) detail+=' · '+fmtDuration(parseInt(e.duration));
          if(e.napLocation) detail+=' · '+e.napLocation;
        }
        h+=`<div class="entry-row">
          <div class="entry-icon" style="background:${cfg.light}">${cfg.emoji}</div>
          <div class="entry-info">
            <div class="entry-title">${cfg.label}${detail?'<span>'+detail+'</span>':''}</div>
            ${e.note?'<div class="entry-note">'+e.note+'</div>':''}
          </div>
          <div class="entry-meta">
            <div class="entry-time">${fmt(e.timestamp)}</div>
            ${e.who?'<div class="entry-who">'+e.who+'</div>':''}
            <button class="remove-btn" onclick="removeEntry('${e.id}')">remove</button>
          </div>
        </div>`;
      });
      h+=`</div></div>`;
    });
  }
  h+=`<div class="spacer"></div></div>`;

  // ── Feed modal ──
  if(modal==='feed'||modal==='wee'||modal==='poo'){
    const cfg=TYPES[modal];
    h+=`<div class="overlay" onclick="closeModal()"><div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-header">
        <div class="sheet-title"><span>${cfg.emoji}</span>Log ${cfg.label}</div>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>
      ${!WHO?'<div class="warn-box">💡 Set your name in ⋯ so entries show who logged what.</div>':''}
      ${modal==='feed'?`
        <div class="field"><label>Feed type</label><div class="pill-row">
          ${FEED_TYPES.map(ft=>`<button class="pill${feedType===ft?' active-feed':''}" onclick="setFeedType('${ft}')">${ft}</button>`).join('')}
        </div></div>
        <div class="two-col">
          <div class="field"><label>Duration (min)</label><input type="number" id="inp-dur" placeholder="e.g. 15" value="${feedDuration}" oninput="feedDuration=this.value"></div>
          ${feedType==='Formula'||feedType==='Expressed'?'<div class="field"><label>Amount (mL)</label><input type="number" id="inp-amt" placeholder="e.g. 90" value="'+feedAmount+'" oninput="feedAmount=this.value"></div>':''}
        </div>`:''}
      <div class="field"><label>Note (optional)</label><input type="text" id="inp-note" placeholder="Any notes…" value="${noteVal}" oninput="noteVal=this.value"></div>
      <button class="btn-primary" style="background:${cfg.color}" onclick="logEntry()">Save Entry</button>
    </div></div>`;
  }

  // ── Nap modal ──
  if(modal==='nap'){
    h+=`<div class="overlay" onclick="closeModal()"><div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-header">
        <div class="sheet-title"><span>😴</span>Log Nap</div>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>
      ${activeNap?'<div class="warn-box">⏱ A nap is already running. Stop it first.</div>':''}
      <div class="pill-row" style="margin-bottom:16px">
        <button class="pill${napMode==='timer'?' active-nap':''}" onclick="setNapMode('timer')">⏱ Start timer</button>
        <button class="pill${napMode==='manual'?' active-nap':''}" onclick="setNapMode('manual')">✏️ Enter manually</button>
      </div>
      ${napMode==='timer'&&!activeNap?`
        <div class="info-box">Tap <strong>Start Nap</strong> and the timer runs in the background. Tap <strong>Stop & Save</strong> when baby wakes up.</div>
        <button class="btn-primary" style="background:var(--nap)" onclick="logEntry()">😴 Start Nap</button>`
      :napMode==='timer'&&activeNap?`
        <div class="info-box">Nap already running — use the banner at the top to stop it.</div>`
      :`
        <div class="field"><label>Duration (minutes)</label><input type="number" id="inp-nap-dur" placeholder="e.g. 45" value="${napDuration}" oninput="napDuration=this.value"></div>
        <div class="field"><label>Where did they sleep? (optional)</label><div class="pill-row">
          ${NAP_LOCATIONS.map(l=>`<button class="pill${napLocation===l?' active-nap':''}" onclick="setNapLocation('${l}')">${l}</button>`).join('')}
        </div></div>
        <div class="field"><label>Note (optional)</label><input type="text" id="inp-note" placeholder="Any notes…" value="${noteVal}" oninput="noteVal=this.value"></div>
        <button class="btn-primary" style="background:var(--nap)" onclick="logEntry()">Save Nap</button>`
      }
    </div></div>`;
  }

  // ── Setup modal ──
  if(modal==='setup'){
    const CODE=`const SHEET_NAME = 'Logs';

function doGet(e) {
  const sheet = getSheet();
  const rows = sheet.getDataRange().getValues();
  const logs = rows.slice(1).map(r => ({
    id: r[0], type: r[1], timestamp: r[2],
    who: r[3], feedType: r[4], duration: r[5],
    amount: r[6], note: r[7], napLocation: r[8]
  })).filter(r => r.id);
  return json({ logs });
}

function doPost(e) {
  const body = JSON.parse(e.postData.contents);
  const sheet = getSheet();
  if (body.action === 'add') {
    const en = body.entry;
    sheet.appendRow([en.id, en.type, en.timestamp,
      en.who||'', en.feedType||'', en.duration||'',
      en.amount||'', en.note||'', en.napLocation||'']);
  }
  if (body.action === 'delete') {
    const rows = sheet.getDataRange().getValues();
    for (let i = rows.length-1; i >= 1; i--) {
      if (rows[i][0] === body.id) { sheet.deleteRow(i+1); break; }
    }
  }
  return json({ ok: true });
}

function getSheet() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sheet = ss.getSheetByName(SHEET_NAME);
  if (!sheet) {
    sheet = ss.insertSheet(SHEET_NAME);
    sheet.appendRow(['id','type','timestamp','who',
      'feedType','duration','amount','note','napLocation']);
  }
  return sheet;
}

function json(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}`;

    h+=`<div class="overlay" onclick="closeModal()"><div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-header">
        <div class="sheet-title">🔗 Connect to Google Sheets</div>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>
      <div class="info-box">Takes ~5 minutes, free. Both phones will share data in real time.</div>
      <div class="setup-step"><div class="step-num">1</div><div class="step-text"><strong>Create a Google Sheet</strong>Go to sheets.google.com → New blank spreadsheet → name it "Baby Tracker".</div></div>
      <div class="setup-step"><div class="step-num">2</div><div class="step-text"><strong>Open Apps Script</strong>Click <strong>Extensions → Apps Script</strong>. Delete all existing code and paste in the code below.</div></div>
      <div class="code-block">
        <button class="copy-code-btn" onclick="copyScript()">Copy</button>
        <pre id="script-code">${CODE.replace(/</g,'&lt;')}</pre>
      </div>
      <div class="setup-step"><div class="step-num">3</div><div class="step-text"><strong>Deploy</strong>Click <strong>Deploy → New deployment</strong>. Set type to <strong>Web app</strong>, Execute as <strong>Me</strong>, Who has access <strong>Anyone</strong>. Click Deploy and authorise.</div></div>
      <div class="deploy-box">
        <div class="deploy-row"><span class="deploy-label">Execute as</span><span class="deploy-val">Me</span></div>
        <div class="deploy-row"><span class="deploy-label">Who has access</span><span class="deploy-val">Anyone</span></div>
      </div>
      <div class="setup-step"><div class="step-num">4</div><div class="step-text"><strong>Paste the URL below</strong>After deploying, copy the Web App URL (ends in /exec) and paste it here.</div></div>
      <div class="field"><label>Web App URL</label><input type="url" id="inp-url" placeholder="https://script.google.com/…/exec" value="${tempUrl}" oninput="tempUrl=this.value"></div>
      <div class="field"><label>Your name</label><input type="text" id="inp-who" placeholder="e.g. Tim" value="${WHO}" oninput="WHO=this.value"></div>
      <button class="btn-primary" style="background:#6B9FD4" onclick="saveUrl()">Save & Connect</button>
    </div></div>`;
  }

  // ── Menu modal ──
  if(modal==='menu'){
    h+=`<div class="overlay" onclick="closeModal()"><div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-header">
        <div class="sheet-title">⋯ Settings</div>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>
      <div class="field"><label>Your name</label><input type="text" id="inp-who" placeholder="e.g. Tim" value="${WHO}" oninput="WHO=this.value"></div>
      <button class="btn-secondary" onclick="saveWho()">Save name</button>
      <div class="divider"></div>
      ${SCRIPT_URL
        ?`<div class="info-box">✅ <strong>Connected to Google Sheets</strong><br>Your wife just needs this HTML file and the same URL.</div>
           <button class="btn-secondary" onclick="openModal('setup')">Change Google Script URL</button>`
        :`<button class="btn-secondary" onclick="openModal('setup')">🔗 Set up Google Sheets sync</button>`
      }
      <div class="divider"></div>
      ${confirmClear
        ?`<div class="confirm-box"><p>Clear all local data?</p><div class="confirm-row"><button class="btn-cancel" onclick="confirmClear=false;render()">Cancel</button><button class="btn-danger-confirm" onclick="clearAll()">Clear</button></div></div>`
        :logs.length>0?`<button class="btn-danger" onclick="confirmClear=true;render()">🗑️ Clear local data</button>`:''
      }
    </div></div>`;
  }

  document.getElementById('app').innerHTML=h;

  // Restore input values
  const vals={
    'inp-url':tempUrl,'inp-who':WHO,'inp-note':noteVal,
    'inp-dur':feedDuration,'inp-amt':feedAmount,
    'inp-nap-dur':napDuration,
  };
  Object.entries(vals).forEach(([id,val])=>{ const el=document.getElementById(id); if(el) el.value=val; });

  // Restart nap tick if active
  if (activeNap && !napTickInterval) {
    napTickInterval = setInterval(renderNapBar, 1000);
  }
}

function renderNapBar() {
  const el=document.getElementById('nap-timer-display');
  if(el&&activeNap) el.textContent=elapsedDisplay(activeNap.startTime);
}

function copyScript() {
  const code=document.getElementById('script-code').textContent;
  navigator.clipboard.writeText(code)
    .then(()=>showToast('📋 Code copied!'))
    .catch(()=>showToast('Select and copy the code manually','#888'));
}

// Auto-refresh every 60s
setInterval(()=>{ if(SCRIPT_URL&&!modal) syncWithSheet(); }, 60000);
setInterval(()=>{ if(!modal) render(); }, 60000);

// Init — restore active nap if any
try {
  const saved=localStorage.getItem('bt-active-nap');
  if(saved) activeNap=JSON.parse(saved);
} catch(e){}

if(SCRIPT_URL){ syncStatus='syncing'; render(); syncWithSheet(); }
else { syncStatus='no-url'; render(); }
</script>
</body>
</html>
