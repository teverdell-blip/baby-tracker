<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Baby Tracker">
<meta name="theme-color" content="#ffffff">
<title>Baby Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --feed: #6B9FD4; --feed-light: #EBF3FB;
    --wee: #F0C040;  --wee-light: #FEF9E7;
    --poo: #A97C50;  --poo-light: #F5EDE3;
    --nap: #9B8EC4;  --nap-light: #F0EDF8;
    --bg: #F5F6F8; --white: #fff;
    --border: #E8E8E8; --text: #1A1A1A; --muted: #888; --faint: #BBB;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; min-height: 100vh; }

  /* ── NAV ── */
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--white); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); z-index: 30; }
  .nav-btn { flex: 1; border: none; background: none; padding: 10px 0 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; color: var(--faint); transition: color 0.15s; }
  .nav-btn.active { color: var(--feed); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* ── HEADER ── */
  .header { background: var(--white); border-bottom: 1px solid var(--border); padding: calc(14px + var(--safe-top)) 16px 12px; position: sticky; top: 0; z-index: 20; }
  .header-inner { display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-weight: 700; font-size: 18px; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .menu-btn { background: #F0F0F0; border: none; border-radius: 10px; padding: 8px 14px; font-size: 20px; cursor: pointer; color: #555; }

  /* ── SYNC ── */
  .sync-bar { padding: 7px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--white); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }
  .sync-left { display: flex; align-items: center; }
  .sync-btn { border: none; border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: #fff; cursor: pointer; }

  /* ── TIMER BARS ── */
  .timer-bar { padding: 9px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .timer-bar-left { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; min-width: 0; }
  .timer-display { font-size: 19px; font-weight: 800; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .timer-controls { display: flex; gap: 6px; flex-shrink: 0; }
  .tctl { border: none; border-radius: 8px; padding: 6px 11px; font-size: 12px; font-weight: 700; color: #fff; cursor: pointer; white-space: nowrap; }

  /* ── TODAY CARDS ── */
  .today-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .today-card { border-radius: 14px; padding: 12px 8px; text-align: center; }
  .today-emoji { font-size: 20px; }
  .today-count { font-weight: 800; font-size: 24px; line-height: 1.1; margin-top: 3px; }
  .today-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .today-sub { font-size: 11px; font-weight: 600; margin-top: 2px; }

  /* ── LOG BUTTONS ── */
  .log-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .log-btn { border: none; border-radius: 12px; padding: 11px 6px; font-weight: 600; font-size: 12px; cursor: pointer; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: opacity 0.1s; }
  .log-btn:active { opacity: 0.75; }

  /* ── HISTORY ── */
  .date-group { margin-bottom: 16px; }
  .date-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px; }
  .entry-list { background: var(--white); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  .entry-row { display: flex; align-items: center; gap: 10px; padding: 11px 13px; border-bottom: 1px solid #F3F3F3; }
  .entry-row:last-child { border-bottom: none; }
  .entry-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-title { font-weight: 600; font-size: 13px; }
  .entry-title span { font-weight: 400; color: var(--muted); }
  .entry-note { font-size: 11px; color: #AAA; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-meta { text-align: right; flex-shrink: 0; }
  .entry-time { font-size: 12px; color: var(--muted); }
  .entry-who { font-size: 11px; color: var(--faint); margin-top: 1px; }
  .remove-btn { background: none; border: none; color: #DDD; font-size: 11px; cursor: pointer; padding: 2px 0; margin-top: 2px; display: block; }

  /* ── DASHBOARD ── */
  .dash-section { margin-bottom: 20px; }
  .dash-title { font-size: 13px; font-weight: 700; color: #444; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .dash-card { background: var(--white); border-radius: 16px; border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
  .dash-card-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }

  /* Chart canvas containers */
  .chart-wrap { position: relative; width: 100%; }

  /* Bar chart */
  .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 80px; margin-bottom: 6px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .bar-seg-wrap { width: 100%; display: flex; flex-direction: column; justify-content: flex-end; flex: 1; gap: 1px; }
  .bar { border-radius: 4px 4px 0 0; width: 100%; transition: height 0.3s ease; min-height: 2px; }
  .bar-label { font-size: 9px; color: var(--muted); text-align: center; white-space: nowrap; }
  .bar-val { font-size: 10px; font-weight: 700; color: #555; }

  /* Line chart (SVG) */
  .line-chart-wrap { width: 100%; overflow: visible; }

  /* Stat row */
  .stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-box { background: var(--bg); border-radius: 10px; padding: 10px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 800; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Range selector */
  .range-pills { display: flex; gap: 6px; }
  .range-pill { border: 1.5px solid var(--border); background: var(--white); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: #666; cursor: pointer; }
  .range-pill.active { border-color: var(--feed); background: var(--feed-light); color: var(--feed); }

  /* Nap sleep timeline */
  .sleep-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
  .sleep-day { width: 28px; color: var(--muted); font-size: 11px; flex-shrink: 0; }
  .sleep-bar-track { flex: 1; height: 14px; background: #F0F0F0; border-radius: 7px; overflow: hidden; position: relative; }
  .sleep-bar-fill { height: 100%; background: var(--nap); border-radius: 7px; }
  .sleep-val { width: 30px; text-align: right; color: #555; font-weight: 600; flex-shrink: 0; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* ── MODALS ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50; display: flex; align-items: flex-end; }
  .sheet { background: var(--white); border-radius: 20px 20px 0 0; padding: 22px 18px calc(28px + var(--safe-bottom)); width: 100%; max-width: 480px; margin: 0 auto; max-height: 92vh; overflow-y: auto; }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .sheet-title { font-weight: 700; font-size: 17px; display: flex; align-items: center; gap: 10px; }
  .close-btn { background: #F0F0F0; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 18px; cursor: pointer; color: #555; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .pill-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .pill { padding: 7px 13px; border-radius: 20px; border: 2px solid #E8E8E8; background: #fff; color: #555; font-weight: 600; font-size: 13px; cursor: pointer; }
  .pill.af { border-color: var(--feed); background: var(--feed-light); color: var(--feed); }
  .pill.an { border-color: var(--nap); background: var(--nap-light); color: var(--nap); }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 5px; }
  .field input, .field select { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #E8E8E8; font-size: 15px; outline: none; background: #fff; }
  .field input:focus { border-color: #AACCE8; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-primary { width: 100%; border: none; border-radius: 14px; padding: 15px; font-weight: 700; font-size: 16px; cursor: pointer; color: #fff; margin-bottom: 10px; }
  .btn-secondary { width: 100%; background: #F0F0F0; border: none; border-radius: 12px; padding: 13px; font-weight: 700; font-size: 15px; cursor: pointer; color: #333; margin-bottom: 10px; display: block; text-align: center; }
  .btn-danger { width: 100%; background: none; border: 1.5px solid #e53935; border-radius: 12px; padding: 11px; font-weight: 600; font-size: 14px; cursor: pointer; color: #e53935; }
  .btn-danger-confirm { background: #e53935; color: #fff; border: none; border-radius: 10px; padding: 10px; font-weight: 600; font-size: 14px; cursor: pointer; flex: 1; }
  .btn-cancel { background: #F0F0F0; border: none; border-radius: 10px; padding: 10px; font-weight: 600; font-size: 14px; cursor: pointer; flex: 1; }

  .info-box { background: #F8F8F8; border-radius: 12px; padding: 13px; margin-bottom: 13px; font-size: 13px; color: #555; line-height: 1.6; }
  .warn-box { background: #FFF8E7; border-radius: 12px; padding: 13px; margin-bottom: 13px; font-size: 13px; color: #7A5C00; line-height: 1.6; }
  .confirm-box { background: #FFF0F0; border-radius: 12px; padding: 13px; }
  .confirm-box p { font-size: 14px; font-weight: 600; color: #c62828; margin-bottom: 10px; }
  .confirm-row { display: flex; gap: 8px; }

  .code-block { background: #1A1E2E; border-radius: 10px; padding: 14px; margin: 10px 0; position: relative; }
  .code-block pre { color: #E2E8F0; font-size: 11px; line-height: 1.7; white-space: pre-wrap; font-family: monospace; margin: 0; }
  .copy-code-btn { position: absolute; top: 10px; right: 10px; background: #334155; border: none; border-radius: 6px; color: #94A3B8; padding: 5px 10px; font-size: 11px; cursor: pointer; }
  .deploy-box { background: #fff; border: 1px solid #E8EBF0; border-radius: 10px; overflow: hidden; margin: 10px 0; }
  .deploy-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #F3F3F3; font-size: 13px; }
  .deploy-row:last-child { border-bottom: none; }
  .deploy-label { color: #666; }
  .deploy-val { font-weight: 600; background: #EBF3FB; border-radius: 6px; padding: 3px 10px; font-size: 12px; color: #4A7FB5; }
  .setup-step { display: flex; gap: 12px; margin-bottom: 14px; }
  .step-num { background: #6B9FD4; color: #fff; border-radius: 50%; width: 26px; height: 26px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-text { font-size: 13px; color: #444; line-height: 1.6; flex: 1; }
  .step-text strong { color: #111; display: block; margin-bottom: 2px; }

  .toast { position: fixed; top: calc(14px + var(--safe-top)); left: 50%; transform: translateX(-50%); color: #fff; padding: 10px 20px; border-radius: 24px; font-weight: 600; font-size: 14px; z-index: 999; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
  .empty { text-align: center; padding: 40px 20px; color: var(--faint); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-weight: 600; font-size: 15px; color: #AAA; }
  .empty-sub { font-size: 13px; margin-top: 4px; }
  .seg-row { display: flex; background: #F0F0F0; border-radius: 10px; padding: 3px; margin-bottom: 14px; }
  .seg-btn { flex: 1; border: none; border-radius: 8px; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; color: #666; transition: all 0.15s; }
  .seg-btn.active { background: #fff; color: #1A1A1A; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
  .content { padding: 14px 14px 80px; }
  .divider { height: 1px; background: #F0F0F0; margin: 14px 0; }
  input[type="datetime-local"] { font-size: 14px; }
  .section-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── CONFIG ──
let SCRIPT_URL = localStorage.getItem('bt-script-url') || '';
let WHO = localStorage.getItem('bt-who') || '';

// ── STATE ──
let logs = [];
let tab = 'home'; // home | history | dashboard | settings
let modal = null;
let feedType = 'Breast L';
let feedDuration = '', feedAmount = '', noteVal = '';
let napDuration = '', napLocation = '';
let napMode = 'timer';
let feedMode = 'timer';
let confirmClear = false;
let syncStatus = 'idle';
let lastSync = null;
let toastTimer = null;
let tempUrl = '';
let backdateVal = '';
let dashRange = 7; // days

let activeNap = null;
let activeFeed = null;
let tickInterval = null;

const FEED_TYPES = ['Breast L','Breast R','Both','Formula','Expressed'];
const NAP_LOCATIONS = ['Cot','Pram','Arms','Car','Carrier'];
const TYPES = {
  feed: { label:'Feed', emoji:'🍼', color:'#6B9FD4', light:'#EBF3FB' },
  wee:  { label:'Wee',  emoji:'💛', color:'#F0C040', light:'#FEF9E7' },
  poo:  { label:'Poo',  emoji:'💩', color:'#A97C50', light:'#F5EDE3' },
  nap:  { label:'Nap',  emoji:'😴', color:'#9B8EC4', light:'#F0EDF8' },
};

// ── HELPERS ──
function fmt(iso) { return new Date(iso).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:true}); }
function fmtDate(iso) {
  const d=new Date(iso),today=new Date(),yest=new Date();
  yest.setDate(today.getDate()-1);
  if(d.toDateString()===today.toDateString()) return 'Today';
  if(d.toDateString()===yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
}
function fmtShort(d) { return d.toLocaleDateString('en-AU',{weekday:'short'}); }
function fmtDay(d)   { return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}); }
function timeSince(iso) {
  const m=Math.floor((Date.now()-new Date(iso))/60000);
  if(m<1) return 'just now'; if(m<60) return m+'m ago';
  return Math.floor(m/60)+'h '+(m%60)+'m ago';
}
function fmtDur(mins) {
  mins=parseInt(mins)||0;
  if(mins===0) return '0m';
  if(mins<60) return mins+'m';
  return Math.floor(mins/60)+'h'+(mins%60>0?' '+(mins%60)+'m':'');
}
function groupByDate(arr) {
  const g={};
  [...arr].reverse().forEach(e=>{ const k=new Date(e.timestamp).toDateString(); if(!g[k])g[k]=[]; g[k].push(e); });
  return g;
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function totalNapMins(dayLogs) { return dayLogs.filter(l=>l.type==='nap').reduce((s,l)=>s+(parseInt(l.duration)||0),0); }
function localDatetimeValue(d) {
  const dt=d||new Date(), pad=n=>String(n).padStart(2,'0');
  return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
}
function showToast(msg,color='#4CAF50') {
  const old=document.getElementById('toast'); if(old)old.remove();
  if(toastTimer)clearTimeout(toastTimer);
  const t=document.createElement('div'); t.id='toast'; t.className='toast'; t.style.background=color; t.textContent=msg;
  document.body.appendChild(t); toastTimer=setTimeout(()=>t.remove(),2800);
}
function getDayRange(n) {
  const days=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0); days.push(d);
  }
  return days;
}

// ── TIMER ──
function timerElapsedMs(t) {
  if(!t) return 0;
  let ms=t.elapsed||0;
  if(!t.paused&&t.startTime) ms+=Date.now()-new Date(t.startTime).getTime();
  return ms;
}
function timerDisplay(t) {
  const ms=timerElapsedMs(t), s=Math.floor(ms/1000);
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return h+'h '+String(m).padStart(2,'0')+'m';
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function timerMins(t) { return Math.round(timerElapsedMs(t)/60000); }
function saveTimers() {
  localStorage.setItem('bt-active-nap',activeNap?JSON.stringify(activeNap):'');
  localStorage.setItem('bt-active-feed',activeFeed?JSON.stringify(activeFeed):'');
  if(SCRIPT_URL) fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'timer',state:{activeNap,activeFeed}})}).catch(()=>{});
}
function pauseTimer(type) {
  const t=type==='nap'?activeNap:activeFeed; if(!t||t.paused)return;
  t.elapsed=timerElapsedMs(t); t.startTime=null; t.paused=true;
  saveTimers(); render();
}
function resumeTimer(type) {
  const t=type==='nap'?activeNap:activeFeed; if(!t||!t.paused)return;
  t.startTime=new Date().toISOString(); t.paused=false;
  saveTimers(); startTick(); render();
}
function stopTimer(type) {
  const t=type==='nap'?activeNap:activeFeed; if(!t)return;
  const mins=Math.max(1,timerMins(t));
  const entry={id:uid(),type,timestamp:t.originalStart||t.startTime,duration:String(mins),who:t.who||WHO||null,note:null,
    ...(type==='feed'&&{feedType:t.feedType||feedType}),
    ...(type==='nap'&&{napLocation:null})};
  if(type==='nap')activeNap=null; else activeFeed=null;
  saveTimers(); logs.push(entry); modal=null; render();
  showToast(TYPES[type].emoji+' '+TYPES[type].label+' saved — '+fmtDur(mins),TYPES[type].color);
  syncWithSheet(entry);
}
function startTick() {
  if(tickInterval)return;
  tickInterval=setInterval(()=>{
    const nd=document.getElementById('nap-td'), fd=document.getElementById('feed-td');
    if(nd&&activeNap&&!activeNap.paused) nd.textContent=timerDisplay(activeNap);
    if(fd&&activeFeed&&!activeFeed.paused) fd.textContent=timerDisplay(activeFeed);
    if(!activeNap&&!activeFeed){clearInterval(tickInterval);tickInterval=null;}
  },1000);
}

// ── SYNC ──
async function syncWithSheet(newEntry=null) {
  if(!SCRIPT_URL){syncStatus='no-url';renderSyncBar();return;}
  syncStatus='syncing'; renderSyncBar();
  try {
    const res=await fetch(SCRIPT_URL+'?action=get');
    const data=await res.json();
    const remote=Array.isArray(data.logs)?data.logs:[];
    const ids=new Set(logs.map(l=>l.id));
    remote.forEach(r=>{if(!ids.has(r.id))logs.push(r);});
    logs.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
    if(data.timerState){
      if(data.timerState.activeNap&&!activeNap){activeNap=data.timerState.activeNap;startTick();}
      if(data.timerState.activeFeed&&!activeFeed){activeFeed=data.timerState.activeFeed;startTick();}
    }
    if(newEntry) await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'add',entry:newEntry})});
    lastSync=new Date(); syncStatus='ok';
  } catch(e){syncStatus='error';}
  render();
}
async function deleteFromSheet(id) {
  if(!SCRIPT_URL)return;
  try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'delete',id})});}catch(e){}
}
function renderSyncBar() {
  const bar=document.getElementById('sync-bar'); if(!bar)return;
  const dotColor=syncStatus==='ok'?'#4CAF50':syncStatus==='error'?'#e53935':syncStatus==='syncing'?'#F0C040':'#CCC';
  const label=syncStatus==='ok'?(lastSync?'Synced '+timeSince(lastSync.toISOString()):'Synced'):
    syncStatus==='syncing'?'Syncing…':syncStatus==='error'?'Sync failed':'Not connected';
  const dot=bar.querySelector('.sync-dot'), lbl=bar.querySelector('.sync-label');
  if(dot)dot.style.background=dotColor; if(lbl)lbl.textContent=label;
}

// ── ACTIONS ──
function setTab(t){tab=t;render();}
function openModal(type){
  modal=type;feedType='Breast L';feedDuration='';feedAmount='';noteVal='';
  napDuration='';napLocation='';napMode='timer';feedMode='timer';
  confirmClear=false;backdateVal=''; render();
}
function closeModal(){modal=null;confirmClear=false;render();}
function setFeedType(ft){feedType=ft;render();}
function setNapLoc(l){napLocation=l;render();}
function setNapMode(m){napMode=m;render();}
function setFeedMode(m){feedMode=m;render();}
function setDashRange(n){dashRange=n;render();}

function readInputs(){
  const g=id=>{const el=document.getElementById(id);return el?el.value:'';};
  feedDuration=g('inp-dur')||feedDuration; feedAmount=g('inp-amt')||feedAmount;
  noteVal=g('inp-note')||noteVal; tempUrl=g('inp-url')||tempUrl;
  WHO=g('inp-who')||WHO; napDuration=g('inp-nap-dur')||napDuration;
  backdateVal=g('inp-backdate')||backdateVal;
}

async function logEntry(){
  readInputs();
  const isNap=modal==='nap', isFeed=modal==='feed';
  const useTimer=(isNap&&napMode==='timer')||(isFeed&&feedMode==='timer');
  if(useTimer){
    if(isNap&&activeNap){showToast('A nap is already running','#e53935');return;}
    if(isFeed&&activeFeed){showToast('A feed is already running','#e53935');return;}
    const timer={startTime:new Date().toISOString(),elapsed:0,paused:false,who:WHO||'',feedType:isFeed?feedType:null};
    timer.originalStart=timer.startTime;
    if(isNap)activeNap=timer; else activeFeed=timer;
    saveTimers();startTick();modal=null;render();
    showToast(TYPES[isNap?'nap':'feed'].emoji+' Timer started!',isNap?'#9B8EC4':'#6B9FD4');
    return;
  }
  const timestamp=backdateVal?new Date(backdateVal).toISOString():new Date().toISOString();
  let entry;
  if(isNap) entry={id:uid(),type:'nap',timestamp,duration:napDuration||null,napLocation:napLocation||null,who:WHO||null,note:noteVal||null};
  else if(isFeed) entry={id:uid(),type:'feed',timestamp,feedType,duration:feedDuration||null,amount:feedAmount||null,who:WHO||null,note:noteVal||null};
  else entry={id:uid(),type:modal,timestamp,who:WHO||null,note:noteVal||null};
  logs.push(entry);
  const t=TYPES[modal]; modal=null; render();
  showToast(t.emoji+' '+t.label+' logged!',t.color);
  await syncWithSheet(entry);
}

async function removeEntry(id){
  logs=logs.filter(l=>l.id!==id); render();
  await deleteFromSheet(id); await syncWithSheet();
}
function clearAll(){logs=[];confirmClear=false;modal=null;render();showToast('🗑️ Data cleared');}
function saveUrl(){
  readInputs(); if(!tempUrl){showToast('Please paste a URL first','#e53935');return;}
  SCRIPT_URL=tempUrl; localStorage.setItem('bt-script-url',SCRIPT_URL);
  if(WHO)localStorage.setItem('bt-who',WHO);
  modal=null; showToast('✅ Connected!'); syncWithSheet();
}
function saveWho(){readInputs();if(WHO)localStorage.setItem('bt-who',WHO);modal=null;render();}

// ── DASHBOARD DATA ──
function getDashData(nDays) {
  const days=getDayRange(nDays);
  return days.map(d=>{
    const key=d.toDateString();
    const dayLogs=logs.filter(l=>new Date(l.timestamp).toDateString()===key);
    return {
      date:d,
      label: nDays<=7 ? fmtShort(d) : (d.getDate()===1||days.indexOf(days.find(x=>x.toDateString()===key))===0)?fmtDay(d):'',
      feeds: dayLogs.filter(l=>l.type==='feed').length,
      wees:  dayLogs.filter(l=>l.type==='wee').length,
      poos:  dayLogs.filter(l=>l.type==='poo').length,
      naps:  dayLogs.filter(l=>l.type==='nap').length,
      napMins: totalNapMins(dayLogs),
      feedMins: dayLogs.filter(l=>l.type==='feed').reduce((s,l)=>s+(parseInt(l.duration)||0),0),
    };
  });
}

function buildBarChart(data, key, color, maxOverride) {
  const vals=data.map(d=>d[key]);
  const max=maxOverride||Math.max(...vals,1);
  return `<div class="bar-chart">
    ${data.map(d=>{
      const h=Math.round((d[key]/max)*70); 
      return `<div class="bar-col">
        <div class="bar-seg-wrap">
          <div class="bar" style="height:${h||2}px;background:${color};opacity:${d[key]>0?1:0.15}"></div>
        </div>
        <div class="bar-label">${d.label}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function buildStackedBar(data) {
  const maxCount=Math.max(...data.map(d=>d.feeds+d.wees+d.poos),1);
  return `<div class="bar-chart">
    ${data.map(d=>{
      const total=d.feeds+d.wees+d.poos;
      const scale=total>0?Math.round((total/maxCount)*70):0;
      const feedH=total>0?Math.round((d.feeds/total)*scale):0;
      const weeH=total>0?Math.round((d.wees/total)*scale):0;
      const pooH=total>0?Math.round((d.poos/total)*scale):0;
      return `<div class="bar-col">
        <div class="bar-seg-wrap" style="gap:1px">
          ${d.poos>0?`<div class="bar" style="height:${pooH}px;background:#A97C50;border-radius:4px 4px 0 0"></div>`:''}
          ${d.wees>0?`<div class="bar" style="height:${weeH}px;background:#F0C040;border-radius:${d.poos>0?'0':'4px 4px'} 0 0"></div>`:''}
          ${d.feeds>0?`<div class="bar" style="height:${feedH}px;background:#6B9FD4;border-radius:${(d.poos>0||d.wees>0)?'0':'4px 4px'} 0 0"></div>`:''}
          ${total===0?`<div class="bar" style="height:2px;background:#EEE;border-radius:4px 4px 0 0"></div>`:''}
        </div>
        <div class="bar-label">${d.label}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function buildSleepBars(data) {
  const maxMins=Math.max(...data.map(d=>d.napMins),60);
  return data.map(d=>{
    const pct=Math.round((d.napMins/maxMins)*100);
    return `<div class="sleep-row">
      <div class="sleep-day">${d.label||fmtShort(d.date)}</div>
      <div class="sleep-bar-track"><div class="sleep-bar-fill" style="width:${pct}%"></div></div>
      <div class="sleep-val">${d.napMins>0?fmtDur(d.napMins):'—'}</div>
    </div>`;
  }).join('');
}

function buildLineChart(data, key, color) {
  const vals=data.map(d=>d[key]);
  const max=Math.max(...vals,1);
  const W=340, H=60, pad=4;
  const pts=vals.map((v,i)=>{
    const x=pad+(i/(vals.length-1||1))*(W-pad*2);
    const y=H-pad-(v/max)*(H-pad*2);
    return `${x},${y}`;
  });
  const pathD='M'+pts.join(' L');
  const areaD=pathD+` L${W-pad},${H} L${pad},${H} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" class="line-chart-wrap" style="height:${H}px">
    <defs><linearGradient id="lg${key}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
    </linearGradient></defs>
    <path d="${areaD}" fill="url(#lg${key})"/>
    <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${vals.map((v,i)=>{
      const x=pad+(i/(vals.length-1||1))*(W-pad*2);
      const y=H-pad-(v/max)*(H-pad*2);
      return v>0?`<circle cx="${x}" cy="${y}" r="3.5" fill="${color}"/>`:'';
    }).join('')}
  </svg>`;
}

// ── RENDER ──
function render() {
  const todayStr=new Date().toDateString();
  const todayLogs=logs.filter(l=>new Date(l.timestamp).toDateString()===todayStr);
  const counts={feed:0,wee:0,poo:0,nap:0};
  todayLogs.forEach(l=>counts[l.type]=(counts[l.type]||0)+1);
  const totalNap=totalNapMins(todayLogs);
  const lastFeed=[...logs].reverse().find(l=>l.type==='feed');
  const isSetup=!SCRIPT_URL;
  const dotColor=syncStatus==='ok'?'#4CAF50':syncStatus==='error'?'#e53935':syncStatus==='syncing'?'#F0C040':'#CCC';

      ?`<button class="sync-btn" style="background:#6B9FD4" onclick="openModal('setup')">Set up sync →</button>`

  if(activeFeed){
    h+=`<div class="timer-bar" style="background:#EBF3FB">

    h+=`<div class="timer-bar" style="background:var(--nap-light)">
      <div class="timer-bar-left" style="color:#5A4A8A">😴 Napping ${activeNap.who?'('+activeNap.who+')':''}
        <span class="timer-display" id="nap-td" style="color:var(--nap)">${timerDisplay(activeNap)}</span>
      </div>
      <div class="timer-controls">
        ${activeNap.paused
          ?`<button class="tctl" style="background:#4CAF50" onclick="resumeTimer('nap')">▶</button>`
          :`<button class="tctl" style="background:#F0A030" onclick="pauseTimer('nap')">⏸</button>`
        }
        <button class="tctl" style="background:var(--nap)" onclick="stopTimer('nap')">■ Stop</button>
      </div>
    </div>`;
  }

  // ── HOME TAB ──
  if(tab==='home'){
    h+=`<div class="content">
    <div class="section-label">Today</div>
    <div class="today-grid">`;
    Object.entries(TYPES).forEach(([type,cfg])=>{
      const extra=type==='nap'?`<div class="today-sub" style="color:${cfg.color}">${totalNap>0?fmtDur(totalNap):'—'}</div>`:

    });
    h+=`</div>
    <div class="log-grid">`;
    Object.entries(TYPES).forEach(([type,cfg])=>{
      const running=(type==='nap'&&activeNap)||(type==='feed'&&activeFeed);
      h+=`<button class="log-btn" style="background:${cfg.color}${running?';opacity:0.6':''}" onclick="openModal('${type}')">

      </button>`;
    });

  }

  // ── HISTORY TAB ──
  if(tab==='history'){
    const grouped=groupByDate(logs);
    h+=`<div class="content">`;
    if(Object.keys(grouped).length===0){
      h+=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No entries yet</div><div class="empty-sub">Log something to see it here</div></div>`;
    } else {
      Object.entries(grouped).forEach(([,entries])=>{
        const dayNap=totalNapMins(entries);
        h+=`<div class="date-group"><div class="date-label">${fmtDate(entries[0].timestamp)}${dayNap>0?' · 😴 '+fmtDur(dayNap):''}</div><div class="entry-list">`;
        entries.forEach(e=>{
          const cfg=TYPES[e.type]; let detail='';
          if(e.type==='feed'){if(e.feedType)detail+=' · '+e.feedType;if(e.duration)detail+=' · '+fmtDur(parseInt(e.duration));if(e.amount)detail+=' · '+e.amount+' mL';}
          if(e.type==='nap'){if(e.duration)detail+=' · '+fmtDur(parseInt(e.duration));if(e.napLocation)detail+=' · '+e.napLocation;}
          h+=`<div class="entry-row">
            <div class="entry-icon" style="background:${cfg.light}">${cfg.emoji}</div>
            <div class="entry-info">
              <div class="entry-title">${cfg.label}${detail?'<span>'+detail+'</span>':''}</div>
              ${e.note?'<div class="entry-note">'+e.note+'</div>':''}
            </div>
            <div class="entry-meta">
              <div class="entry-time">${fmt(e.timestamp)}</div>
              ${e.who?'<div class="entry-who">'+e.who+'</div>':''}

        h+=`</div></div>`;

    h+=`</div>`;

    const data=getDashData(dashRange);
    const totFeeds=data.reduce((s,d)=>s+d.feeds,0);
    const totWees=data.reduce((s,d)=>s+d.wees,0);
    const totPoos=data.reduce((s,d)=>s+d.poos,0);

        <span>Activity Overview</span>
        <div class="range-pills">
          <button class="range-pill${dashRange===7?' active':''}" onclick="setDashRange(7)">7d</button>

        </div>
      </div>

      <div class="stat-row" style="margin-bottom:12px">
        <div class="stat-box"><div class="stat-val" style="color:var(--feed)">${avgFeeds}</div><div class="stat-lbl">Feeds/day</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--nap)">${fmtDur(avgSleep)}</div><div class="stat-lbl">Sleep/day</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--wee)">${avgWees}</div><div class="stat-lbl">Wees/day</div></div>
      </div>
    </div>

    <div class="dash-card">
      <div class="dash-card-title">Feeds per day</div>
      ${buildBarChart(data,'feeds','#6B9FD4')}
      <div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#6B9FD4"></div>Feeds</div></div>
    </div>

    <div class="dash-card">
      <div class="dash-card-title">Feeds trend</div>
      ${data.length>1?buildLineChart(data,'feeds','#6B9FD4'):'<div style="color:var(--muted);font-size:13px">Not enough data yet</div>'}
    </div>

    <div class="dash-card">
      <div class="dash-card-title">Nappy activity</div>
      ${buildStackedBar(data)}
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#6B9FD4"></div>Feeds</div>
        <div class="legend-item"><div class="legend-dot" style="background:#F0C040"></div>Wees</div>
        <div class="legend-item"><div class="legend-dot" style="background:#A97C50"></div>Poos</div>
      </div>
    </div>

    <div class="dash-card">
      <div class="dash-card-title">Daily sleep (naps)</div>
      ${buildSleepBars(data)}
    </div>

    <div class="dash-card">
      <div class="dash-card-title">Nap count per day</div>
      ${buildBarChart(data,'naps','#9B8EC4')}
    </div>

    </div>`;
  }

  // ── BOTTOM NAV ──
  h+=`<nav class="bottom-nav">
    <button class="nav-btn${tab==='home'?' active':''}" onclick="setTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

    </button>
    <button class="nav-btn${tab==='history'?' active':''}" onclick="setTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>

      }

  if(modal==='wee'||modal==='poo'){
    const cfg=TYPES[modal];
    h+=`<div class="overlay" onclick="closeModal()"><div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-header"><div class="sheet-title"><span>${cfg.emoji}</span>Log ${cfg.label}</div><button class="close-btn" onclick="closeModal()">×</button></div>
      <div class="field"><label>Date &amp; time</label><input type="datetime-local" id="inp-backdate" value="${backdateVal||localDatetimeValue()}"></div>

      <button class="btn-primary" style="background:${cfg.color}" onclick="logEntry()">Save ${cfg.label}</button>

  if(modal==='nap'){
    h+=`<div class="overlay" onclick="closeModal()"><div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-header"><div class="sheet-title"><span>😴</span>Log Nap</div><button class="close-btn" onclick="closeModal()">×</button></div>
      ${activeNap?'<div class="warn-box">A nap timer is already running — stop it from the bar above first.</div>':''}
      <div class="seg-row">
        <button class="seg-btn${napMode==='timer'?' active':''}" onclick="setNapMode('timer')">⏱ Timer</button>
        <button class="seg-btn${napMode==='manual'?' active':''}" onclick="setNapMode('manual')">✏️ Manual</button>
      </div>
      ${napMode==='timer'&&!activeNap?`
        <div class="info-box">Tap <strong>Start Nap Timer</strong>. Pause if baby stirs. Stop it from the bar at the top when done.</div>
        <button class="btn-primary" style="background:var(--nap)" onclick="logEntry()">😴 Start Nap Timer</button>`
      :napMode==='manual'?`
        <div class="field"><label>Duration (minutes)</label><input type="number" id="inp-nap-dur" placeholder="e.g. 45" value="${napDuration}"></div>
        <div class="field"><label>Where? (optional)</label><div class="pill-row">
          ${NAP_LOCATIONS.map(l=>`<button class="pill${napLocation===l?' an':''}" onclick="setNapLoc('${l}')">${l}</button>`).join('')}
        </div></div>
        <div class="field"><label>Date &amp; time</label><input type="datetime-local" id="inp-backdate" value="${backdateVal||localDatetimeValue()}"></div>
        <div class="field"><label>Note (optional)</label><input type="text" id="inp-note" placeholder="Any notes…" value="${noteVal}"></div>
        <button class="btn-primary" style="background:var(--nap)" onclick="logEntry()">Save Nap</button>`:''
      }
    </div></div>`;

const TIMER_KEY  = 'bt_timer_state';

function doGet(e) {
  const sheet = getSheet();
  const rows  = sheet.getDataRange().getValues();
  const logs  = rows.slice(1).map(r => ({
    id: r[0], type: r[1], timestamp: r[2],
    who: r[3], feedType: r[4], duration: r[5],
    amount: r[6], note: r[7], napLocation: r[8]
  })).filter(r => r.id);
  const props = PropertiesService.getScriptProperties();
  const timerRaw = props.getProperty(TIMER_KEY);
  const timerState = timerRaw ? JSON.parse(timerRaw) : null;
  return json({ logs, timerState });
}

function doPost(e) {
  const body  = JSON.parse(e.postData.contents);
  const sheet = getSheet();
  const props = PropertiesService.getScriptProperties();
  if (body.action === 'add') {
    const en = body.entry;
    sheet.appendRow([en.id, en.type, en.timestamp,
      en.who||'', en.feedType||'', en.duration||'',
      en.amount||'', en.note||'', en.napLocation||'']);
  }
  if (body.action === 'delete') {
    const rows = sheet.getDataRange().getValues();
    for (let i = rows.length-1; i >= 1; i--) {
      if (rows[i][0] === body.id) { sheet.deleteRow(i+1); break; }
    }
  }
  if (body.action === 'timer') {
    props.setProperty(TIMER_KEY, JSON.stringify(body.state));
  }
  return json({ ok: true });
}

function getSheet() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sheet = ss.getSheetByName(SHEET_NAME);
  if (!sheet) {
    sheet = ss.insertSheet(SHEET_NAME);
    sheet.appendRow(['id','type','timestamp','who',
      'feedType','duration','amount','note','napLocation']);
  }
  return sheet;
}

function json(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
